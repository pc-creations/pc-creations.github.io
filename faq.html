<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - PC-Creations</title>
    <meta name="description"
        content="Antworten auf häufige Fragen zu PC-Reparatur, Zusammenbau und IT-Support in Graz. Preise, Dauer und Ablauf erklärt.">
    <meta name="keywords" content="FAQ IT-Support, PC Reparatur Kosten, PC-Creations Fragen, Graz Computerhilfe">
    <meta name="author" content="Samuel Traussnig">
    <link rel="canonical" href="https://pc-creations.github.io/faq.html">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="FAQ - Antworten zu IT-Support & PC-Bau in Graz">
    <meta property="og:description"
        content="Wie lange dauert eine Reparatur? Was kostet ein Custom-PC? Hier finden Sie alle Antworten.">
    <meta property="og:image" content="https://pc-creations.github.io/logo.jpg">
    <meta property="og:url" content="https://pc-creations.github.io/faq.html">
    <meta name="theme-color" content="#1a0b2e">
    <link rel="stylesheet" href="style.css">

    <script src="layout.js" defer></script>
    <script src="script.js" defer></script>

    <!-- Dark Mode initialization to prevent FOUC -->
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('theme');
                if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark-mode');
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <noscript>
        <div style="text-align: center; padding: 15px; background: #eee;">
            <p>Bitte aktivieren Sie JavaScript, um das Menü zu sehen, oder scrollen Sie nach unten zu meinen <a
                    href="#contact">Kontaktdaten</a>.</p>
        </div>
    </noscript>
    <div id="header-placeholder"></div>

    <main>
        <h1>Frequently Asked Questions</h1>

        <p style="text-align: center; color: var(--color-text-light); margin-bottom: 30px;">Haben Sie Fragen? Hier finden Sie schnelle Antworten auf die wichtigsten Themen.</p>

        <div class="faq-search-container">
            <input type="text" id="faq-search" placeholder="FAQs durchsuchen...">
        </div>

        <div class="faq-container" id="faq-container">
            <details class="faq-item faq-item-missing">
                <summary>Ihre Frage war nicht dabei?</summary>
                <div class="faq-content">
                    <p>Kein Problem! Senden Sie mir Ihre Frage einfach über mein <a href="contact.html" style="font-weight: bold;">Kontaktformular</a>, und ich helfe Ihnen gerne persönlich weiter.</p>
                </div>
            </details>
        </div>
    </main>

</body>

</html>
